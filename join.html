<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>لعبة برا السالفة - أجهزة متعددة (لاعب)</title>

  <style>
    :root{
      --bg:#e9e3d6;
      --green:#3f5b2a;
      --green2:#6e8554;
      --yellow:#f2c300;
      --blue:#bfe3ff;
      --text:#1a1a1a;
      --muted:#9a9a9a;

      --shadow: 0 10px 0 rgba(0,0,0,0.18);
      --shadowSmall: 0 8px 0 rgba(0,0,0,0.18);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    .page{
      min-height: 100vh;
      padding: 14px 12px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .frame{
      width: min(520px, 100%);
      background: var(--bg);
      border: 6px solid var(--green);
      border-radius: 26px;
      padding: 18px 16px 22px;
      position: relative;

      min-height: calc(100vh - 28px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* ✅ نفس فكرة صفحة المقدم: عنوان يمين + لوجو يسار */
    .topRow{
      position: relative;
      min-height: 86px;
      margin-bottom: 10px;
      padding-left: 118px; /* مساحة للّوجو */
    }
    .logo{
      position:absolute;
      left: 10px;
      top: 2px;
      width: 98px;
      height: 98px;
      object-fit: contain;
      opacity: 0.98;
      pointer-events:none;
    }
    .h1{
      position:absolute;
      right: 18px;
      top: 22px;
      margin:0;
      text-align:right;
      color: var(--green);
      font-weight: 1000;
      font-size: 44px;
      letter-spacing: .2px;
      line-height: 1.15;
      white-space:nowrap;
    }

    .centerBlock{
      flex: 1;
      display:flex;
      flex-direction:column;
      align-items:center;
      /* ✅ ننزل العناصر شوي لتكون بالمنتصف */
      padding-top: clamp(28px, 10vh, 80px);
      gap: 16px;
    }

    .nameBox{
      width: min(460px, 92%);
      padding: 14px 14px;
      border: 4px solid var(--green2);
      border-radius: 18px;
      background:#fff;
      font-size: 20px;
      font-weight: 900;
      color:#111;
      outline:none;
      text-align:center;
    }
    .nameBox::placeholder{
      color: var(--muted);
      font-weight: 900;
      font-size: 18px;
      opacity: 0.75;
    }

    .btn{
      width: min(420px, 92%);
      border: 4px solid #000;
      border-radius: 22px;
      padding: 14px 18px;
      font-size: 34px;
      font-weight: 1000;
      box-shadow: var(--shadow);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      text-align:center;
    }
    .btn:active{ transform: translateY(1px); box-shadow: 0 9px 0 rgba(0,0,0,0.18); }

    .btnReady{ background: var(--yellow); color:#111; }

    /* ✅ زر الشراء أصغر من الأطراف + ينزل أكثر */
    .btnBuy{
      width: min(360px, 82%);
      background: var(--blue);
      color:#111;
      font-size: 28px;
    }
    .buySpacer{
      height: clamp(28px, 7vh, 110px); /* ينزل زر الشراء للأسفل */
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .err{
      width: min(460px, 92%);
      text-align:center;
      color:#b00020;
      font-weight: 900;
      font-size: 16px;
      display:none;
      line-height: 1.4;
    }

    /* نخلي مساحة فاضية تحت (مثل الصورة) */
    .bottomSpacer{
      height: clamp(120px, 22vh, 260px);
    }

    @media (max-width: 360px){
      .h1{ font-size: 38px; top: 20px; right: 16px; }
      .logo{ width: 90px; height: 90px; }
      .btn{ font-size: 32px; }
      .btnBuy{ font-size: 26px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <div class="topRow">
        <img class="logo" src="logo.PNG" alt="logo">
        <div class="h1">لعبة برا السالفة</div>
      </div>

      <div class="centerBlock">
        <input id="playerInput" class="nameBox" type="text" placeholder="اكتب اسمك هنا" autocomplete="off" />

        <button id="readyBtn" class="btn btnReady">جاهز</button>

        <div class="buySpacer"></div>

        <button id="buyBtn" class="btn btnBuy">لشراء اللعبة اضغط هنا</button>

        <div id="err" class="err"></div>
      </div>

      <div class="bottomSpacer"></div>
    </div>
  </div>

  <script>
    const playerInput = document.getElementById("playerInput");
    const readyBtn    = document.getElementById("readyBtn");
    const buyBtn      = document.getElementById("buyBtn");
    const errBox      = document.getElementById("err");

    // Placeholder hide
    document.addEventListener('focusin', (e) => {
      if (e.target === playerInput) {
        playerInput.dataset.ph = playerInput.placeholder;
        playerInput.placeholder = '';
      }
    });
    document.addEventListener('focusout', (e) => {
      if (e.target === playerInput) {
        if (!playerInput.value.trim()) {
          playerInput.placeholder = playerInput.dataset.ph || '';
        }
      }
    });

    function showErr(msg){
      errBox.textContent = msg;
      errBox.style.display = "block";
    }
    function hideErr(){
      errBox.textContent = "";
      errBox.style.display = "none";
    }
    function cleanName(x){
      return String(x || "").trim();
    }

    // room from URL
    const params = new URLSearchParams(location.search);
    const roomId = (params.get("room") || "").trim();

    const KEY_PLAYER_NAME   = "bara_playerName_multi";
    const KEY_ROOM          = "bara_roomId_multi_join";
    const KEY_PENDING_ADD   = "bara_pendingAdd_multi"; // ✅ نخلي wait.html هو اللي يضيف اللاعب (عشان السرعة)
    const KEY_PENDING_ROOM  = "bara_pendingRoom_multi";

    if(!roomId){
      showErr("الرابط غير صحيح: رمز الغرفة غير موجود.");
      readyBtn.disabled = true;
    }else{
      sessionStorage.setItem(KEY_ROOM, roomId);
    }

    // restore name
    const saved = (sessionStorage.getItem(KEY_PLAYER_NAME) || "").trim();
    if(saved) playerInput.value = saved;

    buyBtn.addEventListener("click", () => {
      window.open("https://sandooq-m.com", "_blank", "noopener,noreferrer");
    });

    readyBtn.addEventListener("click", () => {
      hideErr();

      const name = cleanName(playerInput.value);
      if(!name){
        showErr("اكتب اسمك أولاً.");
        playerInput.focus();
        return;
      }
      if(!roomId){
        showErr("الرابط غير صحيح.");
        return;
      }

      // حفظ الاسم محلياً
      sessionStorage.setItem(KEY_PLAYER_NAME, name);

      // ✅ علّمنا أن اللاعب يحتاج ينضاف في wait.html
      sessionStorage.setItem(KEY_PENDING_ADD, "1");
      sessionStorage.setItem(KEY_PENDING_ROOM, roomId);

      // ✅ نقل فوري بدون انتظار Firebase
      readyBtn.disabled = true;
      readyBtn.textContent = "جارٍ الدخول...";
      window.location.href = "wait.html?room=" + encodeURIComponent(roomId);
    });
  </script>
</body>
</html>
