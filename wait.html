<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>لعبة برا السالفة - انتظار اللاعب</title>

  <style>
    :root{
      --bg:#e9e3d6;
      --green:#3f5b2a;
      --green2:#6e8554;
      --yellow:#f2c300;
      --blue:#bfe3ff;
      --text:#1a1a1a;
      --muted:#9a9a9a;
      --shadow: 0 10px 0 rgba(0,0,0,0.18);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    .page{
      min-height: 100vh;
      padding: 14px 12px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .frame{
      width: min(520px, 100%);
      background: var(--bg);
      border: 6px solid var(--green);
      border-radius: 26px;
      padding: 18px 16px 22px;
      position: relative;

      min-height: calc(100vh - 28px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topRow{
      position: relative;
      min-height: 86px;
      margin-bottom: 10px;
      padding-left: 118px;
    }
    .logo{
      position:absolute;
      left: 10px;
      top: 2px;
      width: 98px;
      height: 98px;
      object-fit: contain;
      opacity: 0.98;
      pointer-events:none;
    }
    .h1{
      position:absolute;
      right: 18px;
      top: 22px;
      margin:0;
      text-align:right;
      color: var(--green);
      font-weight: 1000;
      font-size: 44px;
      letter-spacing: .2px;
      line-height: 1.15;
      white-space:nowrap;
    }

    .centerBlock{
      flex: 1;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top: clamp(18px, 7vh, 56px);
      gap: 14px;
    }

    .status{
      width: min(460px, 92%);
      background: var(--green);
      border: 4px solid rgba(0,0,0,0.18);
      border-radius: 18px;
      padding: 14px 14px;
      text-align:center;
      font-weight: 1000;
      font-size: 20px;
      color:#fff;

      min-height: 62px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .status.started{
      background: rgba(26,163,84,0.22);
      border-color: rgba(26,163,84,0.65);
      color:#111;
    }
    .statusText{
      display:block;
      width:100%;
      line-height: 1.2;
      white-space:nowrap;
    }

    .namesCard{
      width: min(460px, 92%);
      background: rgba(63,91,42,0.75);
      border-radius: 22px;
      padding: 14px 14px 14px;
    }
    .namesTitle{
      margin: 2px 0 10px;
      text-align:center;
      color:#fff;
      font-size: 30px;
      font-weight: 1000;
    }

    .list{
      background: rgba(0,0,0,0.10);
      border-radius: 18px;
      padding: 12px 10px;
      min-height: 150px;
    }

    .playerItem{
      width: 100%;
      padding: 14px 14px;
      border: 4px solid var(--green2);
      border-radius: 18px;
      background:#fff;
      font-size: 20px;
      font-weight: 900;
      color:#111;
      text-align:center;
      margin-bottom: 12px;
      user-select:none;
    }
    .emptyHint{
      text-align:center;
      color: rgba(255,255,255,0.85);
      font-weight: 900;
      font-size: 16px;
      padding: 10px 8px 6px;
    }

    .buySpacer{
      height: clamp(34px, 10vh, 160px);
    }
    .btn{
      width: min(360px, 82%);
      border: 4px solid #000;
      border-radius: 22px;
      padding: 14px 18px;
      font-size: 28px;
      font-weight: 1000;
      box-shadow: var(--shadow);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      text-align:center;
      background: var(--blue);
      color:#111;
    }
    .btn:active{ transform: translateY(1px); box-shadow: 0 9px 0 rgba(0,0,0,0.18); }

    .err{
      width: min(460px, 92%);
      text-align:center;
      color: #b00020;
      font-weight: 900;
      font-size: 16px;
      display:none;
      line-height: 1.4;
    }

    .bottomSpacer{
      height: clamp(80px, 14vh, 180px);
    }

    @media (max-width: 360px){
      .h1{ font-size: 38px; top: 20px; right: 16px; }
      .logo{ width: 90px; height: 90px; }
      .btn{ font-size: 26px; }
      .namesTitle{ font-size: 28px; }
      .status{ font-size: 18px; min-height: 58px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <div class="topRow">
        <img class="logo" src="logo.PNG" alt="logo">
        <div class="h1">لعبة برا السالفة</div>
      </div>

      <div class="centerBlock">
        <div id="statusBox" class="status">
          <span id="statusText" class="statusText">بانتظار بدء اللعبة…</span>
        </div>

        <div class="namesCard">
          <div class="namesTitle">اسماء اللاعبين</div>
          <div class="list" id="list">
            <div class="emptyHint" id="emptyHint">إذا ما ظهرت الأسماء، انتظر ثواني…</div>
            <div id="playersWrap"></div>
          </div>
        </div>

        <div class="buySpacer"></div>

        <button id="buyBtn" class="btn">لشراء اللعبة اضغط هنا</button>

        <div id="err" class="err"></div>
      </div>

      <div class="bottomSpacer"></div>
    </div>
  </div>

  <script type="module">
    import { ensureRoom, listenRoom, addPlayer } from "./data/firebase.js";

    const statusBox   = document.getElementById("statusBox");
    const statusText  = document.getElementById("statusText");
    const playersWrap = document.getElementById("playersWrap");
    const emptyHint   = document.getElementById("emptyHint");
    const buyBtn      = document.getElementById("buyBtn");
    const errBox      = document.getElementById("err");

    const KEY_PLAYER_NAME    = "bara_playerName_multi";
    const KEY_ROOM_JOIN      = "bara_roomId_multi_join";

    // ✅ مفاتيح الانتقال من join.html
    const KEY_PENDING_ADD    = "bara_pendingAdd_multi";
    const KEY_PENDING_ROOM   = "bara_pendingRoom_multi";

    // ✅ منع تكرار الإضافة عند تحديث الصفحة
    const KEY_ADDED_ROOM     = "bara_addedRoom_multi";

    // ✅ (إضافة مطلوبة فقط) منع تكرار التحويل لصفحة ready
    let redirectedToReady = false;

    // ✅ (إضافة مطلوبة فقط) منع تكرار التحويل لملف الجولة الجديد
    let redirectedToRound = false;

    // ✅ (إضافة مطلوبة فقط) اسم ملف الصفحات الجديدة بعد التصويت
    const ROUND_FILE = "multi_round.html";

    function showErr(msg){
      errBox.textContent = msg;
      errBox.style.display = "block";
    }
    function hideErr(){
      errBox.textContent = "";
      errBox.style.display = "none";
    }
    function cleanName(x){
      return String(x || "").trim();
    }

    function uniqKeepOrder(arr){
      const s = new Set();
      const out = [];
      for(const x of (arr || [])){
        const v = cleanName(x);
        if(!v) continue;
        if(s.has(v)) continue;
        s.add(v);
        out.push(v);
      }
      return out;
    }

    function sortPlayers(list){
      return (list || []).slice().sort((a,b)=>{
        const aa = Number(a?.joinedAt || 0);
        const bb = Number(b?.joinedAt || 0);
        return aa - bb;
      });
    }

    buyBtn.addEventListener("click", () => {
      window.open("https://sandooq-m.com", "_blank", "noopener,noreferrer");
    });

    // room from URL
    const params = new URLSearchParams(location.search);
    const roomId = (params.get("room") || "").trim();

    // (اختياري) دعم اسم المقدم من الرابط لو أضفناه لاحقًا
    const hostFromUrl = cleanName(params.get("host"));

    let animTimer = null;
    let animStep = 0;

    function setStatusText(t){
      statusText.innerHTML = (t && t.trim()) ? t : "&nbsp;";
    }

    function startWaitingAnim(){
      stopWaitingAnim();
      animStep = 0;

      const seq = [
        "بانتظار",
        "بانتظار بدء",
        "بانتظار بدء اللعبة",
        "بانتظار بدء اللعبة .",
        "بانتظار بدء اللعبة ..",
        "بانتظار بدء اللعبة ...",
        ""
      ];

      animTimer = setInterval(() => {
        setStatusText(seq[animStep] || "");
        animStep = (animStep + 1) % seq.length;
      }, 900);

      setStatusText(seq[0]);
    }

    function stopWaitingAnim(){
      if(animTimer){
        clearInterval(animTimer);
        animTimer = null;
      }
    }

    function renderNames(names){
      playersWrap.innerHTML = "";

      const list = uniqKeepOrder(names || []);
      if(list.length === 0){
        emptyHint.style.display = "block";
      }else{
        emptyHint.style.display = "none";
      }

      for(const n of list){
        const div = document.createElement("div");
        div.className = "playerItem";
        div.textContent = n;
        playersWrap.appendChild(div);
      }
    }

    async function tryAddPlayerIfNeeded(roomId, playerName){
      const name = cleanName(playerName);
      if(!name) return;

      const already = cleanName(sessionStorage.getItem(KEY_ADDED_ROOM));
      if(already === roomId) return;

      const pending = sessionStorage.getItem(KEY_PENDING_ADD) === "1";
      const pendingRoom = cleanName(sessionStorage.getItem(KEY_PENDING_ROOM));

      // ✅ إذا جاء من join.html أو لم يتم الإضافة سابقًا لنفس الغرفة
      if(pending && pendingRoom === roomId){
        try{
          await addPlayer(roomId, name);
          sessionStorage.setItem(KEY_ADDED_ROOM, roomId);
          sessionStorage.removeItem(KEY_PENDING_ADD);
          sessionStorage.removeItem(KEY_PENDING_ROOM);
        }catch(e){
          console.warn("addPlayer failed:", e);
        }
      }
    }

    // ✅ (إضافة مطلوبة فقط) نحدد إذا phase تخص الصفحات الجديدة بعد التصويت
    function isRoundPhase(phase){
      const p = cleanName(phase);
      return /^(vote|reveal|guess|results|end)/.test(p);
    }

    function goRound(){
      window.location.href = ROUND_FILE + "?room=" + encodeURIComponent(roomId);
    }

    (async () => {
      if(!roomId){
        showErr("الرابط غير صحيح: رمز الغرفة غير موجود.");
        statusBox.classList.remove("started");
        setStatusText("خطأ في الرابط");
        return;
      }

      hideErr();
      sessionStorage.setItem(KEY_ROOM_JOIN, roomId);

      const localPlayer = cleanName(sessionStorage.getItem(KEY_PLAYER_NAME));
      if(localPlayer){
        renderNames([localPlayer]);
      }

      try{
        await ensureRoom(roomId);

        statusBox.classList.remove("started");
        startWaitingAnim();

        // ✅ أهم تعديل: إضافة اللاعب فعليًا للغرفة (إن لزم)
        if(localPlayer){
          await tryAddPlayerIfNeeded(roomId, localPlayer);
        }

        listenRoom(roomId, (data) => {
          if(!data) return;

          const status  = String(data?.status || "lobby");

          const players = Array.isArray(data?.players) ? data.players : [];
          const ordered = sortPlayers(players);
          const firestoreNames = ordered.map(p => cleanName(p?.name)).filter(Boolean);

          // ✅ اسم المقدم من الغرفة (لو انضاف لاحقًا) أو من الرابط (اختياري)
          const hostName =
            cleanName(data?.hostName) ||
            cleanName(data?.host?.name) ||
            cleanName(data?.host) ||
            hostFromUrl ||
            "";

          let allNames = [];
          if(hostName) allNames.push(hostName);
          allNames = allNames.concat(firestoreNames);

          // ✅ لو اسم اللاعب المحلي مو ظاهر لسه (تأخير)، نضيفه مؤقتًا
          if(localPlayer && !allNames.includes(localPlayer)){
            allNames.push(localPlayer);
          }

          renderNames(allNames);

          // ✅ إذا بدأت مراحل التصويت وما بعدها -> الملف الجديد
          const phase = cleanName(data?.phase);
          if(isRoundPhase(phase) && !redirectedToRound){
            redirectedToRound = true;
            goRound();
            return;
          }

          // ✅ إذا المقدم اختار كتاغوري وبدأ -> phase تصير ready -> ننتقل تلقائيًا
          if(phase === "ready" && !redirectedToReady){
            redirectedToReady = true;
            window.location.href = "ready.html?room=" + encodeURIComponent(roomId);
            return;
          }

          if(status === "playing"){
            stopWaitingAnim();
            statusBox.classList.add("started");
            setStatusText("بدأ اللعب ✅ تابع المقدم على الشاشة.");
          }else{
            statusBox.classList.remove("started");
            if(!animTimer) startWaitingAnim();
          }
        });

      }catch(e){
        console.error(e);
        stopWaitingAnim();
        showErr("صار خطأ في الاتصال. حدّث الصفحة وجرب مرة ثانية.");
        statusBox.classList.remove("started");
        setStatusText("تعذر الاتصال");
      }
    })();
  </script>
</body>
</html>

<!-- wait.html برا السالفة – إصدار 3 (ربط مراحل التصويت/الكشف/النتائج بـ multi_round.html) -->
