<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>تفعيل اللعبة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --beige:#e9e1cf;
      --olive:#6f7a52;
      --olive-dark:#3f4e2c;
      --cream:#f1e9d7;
      --yellow:#f3c515;
      --black:#111;
      --sky:#d8efff;

      --ok:#16a34a;
      --bad:#dc2626;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      background:var(--beige);
      font-family:"Baloo Bhaijaan 2", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
      color:#111;
    }

    .page{
      width:min(560px, 100%);
      min-height:calc(100vh - (env(safe-area-inset-top) + env(safe-area-inset-bottom)));
      margin:auto;
      border:6px solid var(--olive-dark);
      border-radius:22px;
      background:var(--beige);
      padding:22px 18px 26px;
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .topLogo{
      width:min(180px, 55vw);
      height:auto;
      margin-top:10px;
      margin-bottom:14px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }

    .title{
      width:100%;
      text-align:center;
      background:var(--cream);
      border:4px solid var(--black);
      border-radius:18px;
      padding:14px 12px;
      font-weight:900;
      font-size:clamp(26px, 5.5vw, 40px);
      margin:0 0 14px;
      box-shadow:0 10px 0 rgba(0,0,0,.18);
    }

    .card{
      width:100%;
      background:var(--olive);
      border-radius:20px;
      padding:16px 16px 18px;
      box-shadow:0 18px 0 rgba(0,0,0,.10);
      position:relative;
    }

    .card::after{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      bottom:-22px;
      height:28px;
      background:rgba(0,0,0,.18);
      border-radius:999px;
      opacity:.22;
    }

    .inner{
      background:rgba(241,233,215,.96);
      border:4px solid var(--black);
      border-radius:18px;
      padding:14px;
      color:#111;
    }

    .tabs{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }

    .tabBtn{
      flex:1;
      height:52px;
      border-radius:14px;
      border:3px solid var(--black);
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:18px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .tabBtn.active{
      background:var(--sky);
    }

    .label{
      font-weight:900;
      font-size:18px;
      margin:0 0 8px;
      text-align:right;
    }

    .group + .group{
      margin-top:14px;
    }

    .input{
      width:100%;
      height:56px;
      border-radius:14px;
      border:2px solid rgba(17,17,17,.25);
      background:#fff;
      padding:0 14px;
      font-size:18px;
      font-weight:800;
      outline:none;
      text-align:left;
      direction:ltr;
    }

    .input:focus{
      border-color: rgba(17,17,17,.45);
      box-shadow: 0 0 0 4px rgba(17,17,17,.12);
    }

    .btn{
      width:100%;
      margin-top:14px;
      height:58px;
      border:4px solid var(--black);
      border-radius:18px;
      background:var(--yellow);
      color:#111;
      font-weight:900;
      font-size:24px;
      cursor:pointer;
      box-shadow:0 12px 0 rgba(0,0,0,.22);
      -webkit-tap-highlight-color:transparent;
      transition:transform .05s ease;
    }

    .btn:active{transform:translateY(1px)}
    .btn[disabled]{opacity:.75; cursor:not-allowed}

    .subBtn{
      width:100%;
      margin-top:10px;
      height:52px;
      border:3px solid var(--black);
      border-radius:16px;
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:18px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .msg{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      display:none;
      text-align:center;
      font-size:16px;
      line-height:1.7;
      white-space:pre-wrap;
    }

    .msg.ok{display:block; background:rgba(22,163,74,.12); border:2px solid rgba(22,163,74,.35); color:#0b3d1d}
    .msg.err{display:block; background:rgba(220,38,38,.10); border:2px solid rgba(220,38,38,.35); color:#7a1212}

    .note{
      margin:10px 0 0;
      font-size:13px;
      font-weight:900;
      color:rgba(17,17,17,.75);
      text-align:center;
      line-height:1.8;
    }

    .hint{
      margin:0 0 12px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(216,239,255,.7);
      border:2px solid rgba(17,17,17,.12);
      text-align:center;
      font-weight:900;
      font-size:15px;
      line-height:1.7;
      display:none;
    }

    .hint.show{display:block}

    .foot{
      margin-top:auto;
      padding-top:16px;
      font-size:12px;
      font-weight:900;
      color:rgba(17,17,17,.55);
      text-align:center;
    }

    .hidden{display:none !important;}
  </style>
</head>

<body>
  <main class="page">
    <img class="topLogo" src="logo.PNG" alt="شعار صندوق المسابقات">

    <div class="title">تفعيل اللعبة</div>

    <section class="card" aria-label="تفعيل اللعبة">
      <div class="inner">
        <div class="tabs" id="tabs">
          <button id="tabRegister" class="tabBtn active" type="button">إنشاء حساب</button>
          <button id="tabLogin" class="tabBtn" type="button">تسجيل دخول</button>
        </div>

        <div id="hint" class="hint"></div>

        <div class="group">
          <div class="label">أدخل الإيميل</div>
          <input
            id="email"
            class="input"
            type="email"
            inputmode="email"
            autocomplete="email"
            autocapitalize="off"
            spellcheck="false"
            placeholder="name@example.com"
          />
        </div>

        <div id="passwordGroup" class="group">
          <div class="label">أدخل كلمة المرور</div>
          <input
            id="password"
            class="input"
            type="password"
            autocomplete="current-password"
            placeholder="6 أحرف أو أكثر"
          />
        </div>

        <div id="codeGroup" class="group hidden">
          <div class="label">أدخل كود اللعبة</div>
          <input
            id="code"
            class="input"
            inputmode="text"
            autocomplete="off"
            autocapitalize="characters"
            placeholder="مثال: SNDQ-XXXX-XXXX-XXXX"
          />
        </div>

        <button id="btn" class="btn" type="button">إنشاء حساب</button>
        <button id="logoutBtn" class="subBtn hidden" type="button">تسجيل الخروج</button>

        <div id="msg" class="msg"></div>

        <div class="note" id="note">
          أول مرة: أنشئ حساب أو سجّل دخول، ثم فعّل الكود مرة واحدة فقط.
        </div>
      </div>
    </section>

    <div class="foot">© صندوق المسابقات</div>
  </main>

  <script>
    const API_BASE = "https://bara-auth.sandooq-m.workers.dev";
    const GAME_KEY = "bara_alsalfah";

    const LS_ACTIVE = `SNDQ_ACTIVE_${GAME_KEY}`;
    const LS_CODE   = `SNDQ_CODE_${GAME_KEY}`;
    const LS_EMAIL  = `SNDQ_EMAIL_${GAME_KEY}`;
    const LS_TOKEN  = `SNDQ_TOKEN_${GAME_KEY}`;

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const codeEl = document.getElementById("code");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const note = document.getElementById("note");
    const hint = document.getElementById("hint");

    const tabRegister = document.getElementById("tabRegister");
    const tabLogin = document.getElementById("tabLogin");
    const passwordGroup = document.getElementById("passwordGroup");
    const codeGroup = document.getElementById("codeGroup");
    const logoutBtn = document.getElementById("logoutBtn");
    const tabs = document.getElementById("tabs");

    let mode = "register";

    function getNext(){
      const u = new URL(location.href);
      return u.searchParams.get("next") || "single.html";
    }

    function normalizeCode(v){
      return (v || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/[—–]/g, "-");
    }

    function normalizeEmail(v){
      return (v || "")
        .trim()
        .toLowerCase();
    }

    function isValidCodeFormat(code){
      return /^SNDQ-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(code);
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showMsg(text, type){
      msg.className = "msg " + (type === "ok" ? "ok" : "err");
      msg.textContent = text;
      msg.style.display = "block";
    }

    function hideMsg(){
      msg.style.display = "none";
      msg.textContent = "";
      msg.className = "msg";
    }

    function showHint(text){
      hint.textContent = text;
      hint.classList.add("show");
    }

    function hideHint(){
      hint.textContent = "";
      hint.classList.remove("show");
    }

    function getToken(){
      return localStorage.getItem(LS_TOKEN) || "";
    }

    function setAuthState({ token, email, code, activated }){
      if (token) localStorage.setItem(LS_TOKEN, token);
      if (email) localStorage.setItem(LS_EMAIL, email);
      if (code) localStorage.setItem(LS_CODE, code);

      if (activated) localStorage.setItem(LS_ACTIVE, "1");
      else localStorage.removeItem(LS_ACTIVE);
    }

    function clearAuthState(){
      localStorage.removeItem(LS_TOKEN);
      localStorage.removeItem(LS_EMAIL);
      localStorage.removeItem(LS_CODE);
      localStorage.removeItem(LS_ACTIVE);
    }

    function isActivatedLocally(){
      return (
        localStorage.getItem(LS_ACTIVE) === "1" &&
        !!localStorage.getItem(LS_CODE) &&
        !!localStorage.getItem(LS_EMAIL) &&
        !!localStorage.getItem(LS_TOKEN)
      );
    }

    function setMode(next){
      mode = next;
      hideMsg();
      hideHint();

      tabRegister.classList.toggle("active", mode === "register");
      tabLogin.classList.toggle("active", mode === "login");

      tabs.classList.remove("hidden");
      passwordGroup.classList.remove("hidden");
      codeGroup.classList.add("hidden");
      logoutBtn.classList.add("hidden");

      if(mode === "register"){
        btn.textContent = "إنشاء حساب";
        note.textContent = "أول مرة: أنشئ حساب أو سجّل دخول، ثم فعّل الكود مرة واحدة فقط.";
        passwordEl.autocomplete = "new-password";
      } else if(mode === "login"){
        btn.textContent = "تسجيل دخول";
        note.textContent = "إذا كان لديك حساب مسبقًا، سجّل دخولك ثم أكمل التفعيل إذا لزم.";
        passwordEl.autocomplete = "current-password";
      } else if(mode === "activate"){
        btn.textContent = "تفعيل الكود";
        tabs.classList.add("hidden");
        passwordGroup.classList.add("hidden");
        codeGroup.classList.remove("hidden");
        logoutBtn.classList.remove("hidden");
        note.textContent = "هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل.";
        showHint("تم تسجيل الدخول بنجاح. أكمل التفعيل بإدخال الكود.");
      }
    }

    async function api(path, options = {}){
      const token = options.token || "";
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if(token){
        headers["Authorization"] = `Bearer ${token}`;
      }

      const res = await fetch(API_BASE + path, {
        method: options.method || "GET",
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined,
      });

      let data = {};
      try {
        data = await res.json();
      } catch(e) {
        data = {};
      }

      return { okHttp: res.ok, status: res.status, data };
    }

    async function checkSessionAndRoute(){
      const token = getToken();
      const savedEmail = normalizeEmail(localStorage.getItem(LS_EMAIL) || "");

      if(savedEmail) emailEl.value = savedEmail;

      if(!token){
        if(isActivatedLocally()){
          clearAuthState();
        }
        setMode(savedEmail ? "login" : "register");
        return;
      }

      btn.disabled = true;
      showMsg("جاري التحقق من الجلسة…", "ok");

      try{
        const res = await api("/api/me", { method: "GET", token });

        if(res.data && res.data.ok && res.data.user){
          const user = res.data.user;
          const email = normalizeEmail(user.email || "");

          localStorage.setItem(LS_EMAIL, email);

          if(user.activated){
            setAuthState({
              token,
              email,
              code: user.activatedCode || localStorage.getItem(LS_CODE) || "",
              activated: true
            });

            showMsg("تم التحقق من الحساب ✅ سيتم فتح اللعبة الآن…", "ok");
            setTimeout(() => location.replace(getNext()), 500);
            return;
          }

          setAuthState({
            token,
            email,
            code: "",
            activated: false
          });

          setMode("activate");
          btn.disabled = false;
          hideMsg();
          return;
        }

        clearAuthState();
        setMode(savedEmail ? "login" : "register");
        hideMsg();
        btn.disabled = false;

      }catch(e){
        setMode(savedEmail ? "login" : "register");
        showMsg("تعذر التحقق من الجلسة الآن. جرّب مرة ثانية.", "err");
        btn.disabled = false;
      }
    }

    async function registerNow(){
      const email = normalizeEmail(emailEl.value);
      const password = String(passwordEl.value || "");

      emailEl.value = email;

      if(!email){
        showMsg("اكتب الإيميل أولاً.", "err");
        return;
      }

      if(!isValidEmail(email)){
        showMsg("صيغة الإيميل غير صحيحة.", "err");
        return;
      }

      if(!password){
        showMsg("اكتب كلمة المرور.", "err");
        return;
      }

      if(password.length < 6){
        showMsg("كلمة المرور يجب أن تكون 6 أحرف على الأقل.", "err");
        return;
      }

      btn.disabled = true;
      showMsg("جاري إنشاء الحساب…", "ok");

      try{
        const res = await api("/api/register", {
          method: "POST",
          body: { email, password }
        });

        if(res.data && res.data.ok){
          setAuthState({
            token: res.data.token || "",
            email,
            code: "",
            activated: !!(res.data.user && res.data.user.activated)
          });

          passwordEl.value = "";

          if(res.data.user && res.data.user.activated){
            showMsg("الحساب مفعّل ✅ سيتم فتح اللعبة الآن…", "ok");
            setTimeout(() => location.replace(getNext()), 500);
            return;
          }

          setMode("activate");
          showMsg("تم إنشاء الحساب بنجاح ✅ الآن أدخل كود اللعبة.", "ok");
          btn.disabled = false;
          return;
        }

        const m = (res.data && res.data.message) ? res.data.message : "تعذر إنشاء الحساب.";
        showMsg(m, "err");
        btn.disabled = false;

      }catch(e){
        showMsg("صار خطأ بالاتصال. جرّب مرة ثانية.", "err");
        btn.disabled = false;
      }
    }

    async function loginNow(){
      const email = normalizeEmail(emailEl.value);
      const password = String(passwordEl.value || "");

      emailEl.value = email;

      if(!email){
        showMsg("اكتب الإيميل أولاً.", "err");
        return;
      }

      if(!isValidEmail(email)){
        showMsg("صيغة الإيميل غير صحيحة.", "err");
        return;
      }

      if(!password){
        showMsg("اكتب كلمة المرور.", "err");
        return;
      }

      btn.disabled = true;
      showMsg("جاري تسجيل الدخول…", "ok");

      try{
        const res = await api("/api/login", {
          method: "POST",
          body: { email, password }
        });

        if(res.data && res.data.ok){
          const user = res.data.user || {};

          setAuthState({
            token: res.data.token || "",
            email,
            code: user.activatedCode || "",
            activated: !!user.activated
          });

          passwordEl.value = "";

          if(user.activated){
            showMsg("تم تسجيل الدخول ✅ سيتم فتح اللعبة الآن…", "ok");
            setTimeout(() => location.replace(getNext()), 500);
            return;
          }

          setMode("activate");
          showMsg("تم تسجيل الدخول ✅ الحساب غير مفعّل بعد، أدخل الكود.", "ok");
          btn.disabled = false;
          return;
        }

        const m = (res.data && res.data.message) ? res.data.message : "تعذر تسجيل الدخول.";
        showMsg(m, "err");
        btn.disabled = false;

      }catch(e){
        showMsg("صار خطأ بالاتصال. جرّب مرة ثانية.", "err");
        btn.disabled = false;
      }
    }

    async function activateNow(){
      const email = normalizeEmail(emailEl.value || localStorage.getItem(LS_EMAIL) || "");
      const code = normalizeCode(codeEl.value);
      const token = getToken();

      emailEl.value = email;
      codeEl.value = code;

      if(!token){
        showMsg("يجب تسجيل الدخول أولاً.", "err");
        setMode("login");
        return;
      }

      if(!code){
        showMsg("اكتب الكود أولاً.", "err");
        return;
      }

      if(!isValidCodeFormat(code)){
        showMsg("صيغة الكود غير صحيحة. مثال: SNDQ-XXXX-XXXX-XXXX", "err");
        return;
      }

      btn.disabled = true;
      showMsg("جاري تفعيل الحساب…", "ok");

      try{
        const res = await api("/api/activate", {
          method: "POST",
          token,
          body: { code }
        });

        if(res.data && res.data.ok){
          setAuthState({
            token,
            email,
            code,
            activated: true
          });

          showMsg("تم التفعيل بنجاح ✅ سيتم فتح اللعبة الآن…", "ok");
          setTimeout(() => location.replace(getNext()), 650);
          return;
        }

        const m = (res.data && res.data.message) ? res.data.message : "تعذر تفعيل الكود.";
        showMsg(m, "err");
        btn.disabled = false;

      }catch(e){
        showMsg("صار خطأ بالاتصال. جرّب مرة ثانية.", "err");
        btn.disabled = false;
      }
    }

    function submitCurrent(){
      hideMsg();

      if(mode === "register"){
        registerNow();
      }else if(mode === "login"){
        loginNow();
      }else{
        activateNow();
      }
    }

    tabRegister.addEventListener("click", () => setMode("register"));
    tabLogin.addEventListener("click", () => setMode("login"));
    btn.addEventListener("click", submitCurrent);

    logoutBtn.addEventListener("click", () => {
      clearAuthState();
      codeEl.value = "";
      passwordEl.value = "";
      setMode("login");
      showMsg("تم تسجيل الخروج.", "ok");
    });

    emailEl.addEventListener("keydown", (e) => {
      if(e.key === "Enter") submitCurrent();
    });

    passwordEl.addEventListener("keydown", (e) => {
      if(e.key === "Enter") submitCurrent();
    });

    codeEl.addEventListener("keydown", (e) => {
      if(e.key === "Enter") submitCurrent();
    });

    window.addEventListener("load", () => {
      checkSessionAndRoute();
      setTimeout(() => {
        const savedEmail = normalizeEmail(localStorage.getItem(LS_EMAIL) || "");
        if(savedEmail){
          emailEl.value = savedEmail;
        }
      }, 50);
    });
  </script>
</body>
</html>
