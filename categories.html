<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>اختر نوع السالفة</title>

  <style>
    :root{
      --beige:#e8e2d4;
      --green:#6f8250;
      --green-dark:#3e4f23;
      --black:#111;
      --yellow:#f6c61a;
      --blue:#d7efff;
      --card:#e8e2d4;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--beige);
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color:#111;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .page{
      width:min(520px, 100%);
      min-height:100vh;
      padding:18px 14px 22px;
      position:relative;
    }

    .frame{
      border:10px solid var(--green-dark);
      border-radius:26px;
      background:var(--beige);
      padding:14px 14px 18px;
      min-height:calc(100vh - 40px);
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      position:relative;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .gameName{
      margin:0;
      font-weight:800;
      color:var(--green-dark);
      font-size:18px;
      line-height:1.1;
      text-align:right;
      padding-top:6px;
    }

    .logo{
      width:86px;
      height:auto;
      object-fit:contain;
    }

    .title{
      text-align:center;
      margin:8px 0 14px;
      font-weight:900;
      color:var(--green-dark);
      font-size:clamp(30px, 4.8vw, 44px);
      letter-spacing:.2px;
    }

    .gridWrap{
      background:var(--green);
      border-radius:18px;
      padding:16px 14px;
      margin:0 auto 16px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }

    .cat{
      background:var(--card);
      border:6px solid #000;
      border-radius:18px;
      padding:10px 10px 12px;
      box-shadow:0 6px 0 rgba(0,0,0,.25);
      cursor:pointer;
      user-select:none;
      transition:transform .08s ease, background .12s ease, box-shadow .12s ease;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:140px;
      position:relative;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    .cat:active{ transform:scale(.99); }

    .cat.active{
      background:var(--blue);
      box-shadow:0 6px 0 rgba(0,0,0,.25), 0 0 0 6px rgba(0,0,0,.25) inset;
    }

    .catTitle{
      font-size:clamp(22px, 4.2vw, 34px);
      font-weight:900;
      color:#000;
      text-align:center;
      margin:2px 0 8px;
      line-height:1.05;
    }

    .catImageWrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex:1;
      padding-bottom:2px;
    }

    .cat img{
      display:block;
      object-fit:contain;
      filter: drop-shadow(0 2px 0 rgba(0,0,0,.15));
      opacity:0;
      transition:opacity .18s ease;
    }

    .cat img.loaded{
      opacity:1;
    }

    .primaryBtn{
      width:min(300px, 70%);
      margin:14px auto 0;
      background:var(--yellow);
      border:6px solid #000;
      border-radius:999px;
      font-size:clamp(24px, 4.4vw, 34px);
      font-weight:900;
      padding:12px 16px;
      cursor:pointer;
      box-shadow:0 10px 0 rgba(0,0,0,.25);
      display:block;
      position:sticky;
      bottom:18px;
      color:#000;
    }
    .primaryBtn:active{ transform:translateY(1px); box-shadow:0 9px 0 rgba(0,0,0,.25); }
    .primaryBtn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .homeBtn{
      position:absolute;
      left:18px;
      bottom:18px;
      width:72px;
      height:72px;
      border-radius:50%;
      border:6px solid #000;
      background:#a9dbff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 0 rgba(0,0,0,.25);
      -webkit-tap-highlight-color:transparent;
    }
    .homeBtn:active{ transform:translateY(1px); box-shadow:0 7px 0 rgba(0,0,0,.25); }

    .homeBtn svg{
      width:44px;
      height:44px;
      fill:#111;
    }

    @media (max-width:360px){
      .grid{ gap:12px; }
      .cat{ min-height:128px; border-width:5px; }
      .homeBtn{ width:66px; height:66px; }
      .homeBtn svg{ width:40px; height:40px; }
      .primaryBtn{ width:min(290px, 74%); }
      .logo{ width:78px; }
      .gameName{ font-size:18px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <div class="topbar">
        <h3 class="gameName">لعبة برا السالفة</h3>
        <img class="logo" src="logo.PNG" alt="logo">
      </div>

      <div class="title">اختر نوع السالفة</div>

      <div class="gridWrap">
        <div class="grid" id="grid"></div>
      </div>

      <button class="primaryBtn" id="startBtn" disabled>ابدأ اللعب</button>

      <button class="homeBtn" id="homeBtn" aria-label="الرئيسية" title="الرئيسية">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/>
        </svg>
      </button>
    </div>
  </div>

  
  <script>
    const API_BASE = "https://bara-auth.sandooq-games.com";
    const GAME_KEY = "bara_alsalfah";

    const LS_ACTIVE = `SNDQ_ACTIVE_${GAME_KEY}`;
    const LS_CODE   = `SNDQ_CODE_${GAME_KEY}`;
    const LS_EMAIL  = `SNDQ_EMAIL_${GAME_KEY}`;
    const LS_TOKEN  = `SNDQ_TOKEN_${GAME_KEY}`;

    const NEW_AUTH_API_BASE = "https://sandooq-games-api.sandooq-m.workers.dev";
    const NEW_GAME_ID = "bra-alsalfah";
    const NEW_SITE_ACCESS_KEY = "SNDQ_SITE_ACCESS_bra_alsalfah_v1";
    const NEW_SITE_TOKEN_KEY = "SNDQ_SITE_TOKEN_bra_alsalfah_v1";
    const NEW_SITE_GAME_KEY = "SNDQ_SITE_GAME_bra_alsalfah_v1";
    const NEW_SITE_TEMP_KEY = "SNDQ_SITE_TEMP_bra_alsalfah_v1";

    const IMAGE_SIZES = {
      eat:  { file: "eat.PNG",  w: 190, h: 120 },
      zoo:  { file: "zoo.PNG",  w: 260, h: 130 },
      play: { file: "play.PNG", w: 185, h: 98  },
      car:  { file: "car.PNG",  w: 390, h: 130 },
      frot: { file: "frot.PNG", w: 190, h: 130 },
      cola: { file: "cola.PNG", w: 190, h: 130 }
    };

    const CATEGORIES = [
      { key:"eat",  label:"مأكولات" },
      { key:"zoo",  label:"حيوانات" },
      { key:"play", label:"لاعبين" },
      { key:"car",  label:"سيارات" },
      { key:"frot", label:"فواكة وخضار" },
      { key:"cola", label:"مشروبات" }
    ];

    const KEY_PLAYERS = "players";
    const KEY_CATEGORY = "categoryKey";

    const ALT_PLAYER_KEYS = ["bara_players","bara_players_list","baraPlayers","bara_players_names","bara_players_v1"];
    const ALT_CAT_KEYS = ["bara_category_id","bara_selectedCategory","bara_category","bara_category_key"];

    const grid = document.getElementById("grid");
    const startBtn = document.getElementById("startBtn");
    const homeBtn = document.getElementById("homeBtn");

    let selectedKey = null;
    let selectedLabel = "";

    function readSession(key){
      try{ return sessionStorage.getItem(key) || ""; }catch(e){ return ""; }
    }

    function writeSession(key, value){
      try{ sessionStorage.setItem(key, String(value || "")); }catch(e){}
    }

    function readLocal(key){
      try{ return localStorage.getItem(key) || ""; }catch(e){ return ""; }
    }

    function writeLocal(key, value){
      try{ localStorage.setItem(key, String(value || "")); }catch(e){}
    }

    function normalizeGameId(value){
      const gameId = String(value || "").trim().toLowerCase();
      return gameId === NEW_GAME_ID ? NEW_GAME_ID : "";
    }

    function readQueryValue(keys){
      const params = new URLSearchParams(location.search || "");
      for(const key of keys){
        const value = String(params.get(key) || "").trim();
        if(value) return value;
      }
      return "";
    }

    function readBooleanQuery(keys){
      const value = readQueryValue(keys);
      return value === "1" || value === "true" || value === "yes";
    }

    function createTemporaryDeviceToken(){
      try{
        if(crypto.randomUUID) return "bara_site_" + crypto.randomUUID();
      }catch(e){}

      try{
        const bytes = new Uint8Array(16);
        crypto.getRandomValues(bytes);
        return "bara_site_" + Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
      }catch(e){}

      return "bara_site_" + Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function rememberNewSiteAccess(token, gameId, isTemporary){
      if(!token || gameId !== NEW_GAME_ID) return;

      writeSession(NEW_SITE_ACCESS_KEY, "1");
      writeSession(NEW_SITE_TOKEN_KEY, token);
      writeSession(NEW_SITE_GAME_KEY, gameId);
      writeSession(NEW_SITE_TEMP_KEY, isTemporary ? "1" : "0");

      writeLocal(NEW_SITE_ACCESS_KEY, "1");
      writeLocal(NEW_SITE_TOKEN_KEY, token);
      writeLocal(NEW_SITE_GAME_KEY, gameId);
      writeLocal(NEW_SITE_TEMP_KEY, isTemporary ? "1" : "0");
    }

    function getRememberedNewSiteAccess(){
      const token = String(
        readQueryValue(["sg_token", "sandooq_token", "access_token", "token"]) ||
        readSession(NEW_SITE_TOKEN_KEY) ||
        readLocal(NEW_SITE_TOKEN_KEY)
      ).trim();

      const gameId = normalizeGameId(
        readQueryValue(["sg_game", "game_id", "game"]) ||
        readSession(NEW_SITE_GAME_KEY) ||
        readLocal(NEW_SITE_GAME_KEY) ||
        NEW_GAME_ID
      );

      const isTemporary =
        readBooleanQuery(["sg_temp", "temporary", "is_temporary"]) ||
        readSession(NEW_SITE_TEMP_KEY) === "1" ||
        readLocal(NEW_SITE_TEMP_KEY) === "1";

      if(token && gameId === NEW_GAME_ID){
        rememberNewSiteAccess(token, gameId, isTemporary);
        return {
          allowed: true,
          token,
          gameId,
          isTemporary
        };
      }

      return {
        allowed: false,
        token: "",
        gameId: "",
        isTemporary: false
      };
    }

    function cleanNewAccessParamsFromUrl(){
      try{
        const url = new URL(location.href);
        [
          "sg_token",
          "sandooq_token",
          "access_token",
          "token",
          "sg_game",
          "game_id",
          "game",
          "sg_temp",
          "temporary",
          "is_temporary"
        ].forEach(key => url.searchParams.delete(key));

        const clean = url.pathname + (url.search ? url.search : "") + (url.hash || "");
        history.replaceState(null, document.title, clean);
      }catch(e){}
    }

    async function verifyNewSystemAccess(){
      const siteAccess = getRememberedNewSiteAccess();
      if(!siteAccess.allowed) return false;

      try{
        const res = await fetch(NEW_AUTH_API_BASE + "/api/game/access", {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=utf-8",
            "Authorization": "Bearer " + siteAccess.token
          },
          body: JSON.stringify({
            game_id: NEW_GAME_ID,
            device_token: createTemporaryDeviceToken(),
            device_name: "Bra Alsalfah Categories Access",
            is_temporary: true
          }),
          cache: "no-store"
        });

        let data = {};
        try{ data = await res.json(); }catch(e){ data = {}; }

        if(res.ok && data && data.allowed === true){
          rememberNewSiteAccess(siteAccess.token, NEW_GAME_ID, true);
          cleanNewAccessParamsFromUrl();
          return true;
        }
      }catch(e){}

      return false;
    }

    async function ensureAuthorized(){
      const siteAccess = getRememberedNewSiteAccess();

      if(siteAccess.allowed){
        verifyNewSystemAccess();
        return true;
      }

      const token = localStorage.getItem(LS_TOKEN) || "";
      const nextUrl = "categories.html";

      if(!token){
        location.replace("activation.html?next=" + encodeURIComponent(nextUrl));
        return false;
      }

      try{
        const res = await fetch(API_BASE + "/api/me", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        let data = {};
        try{
          data = await res.json();
        }catch(e){
          data = {};
        }

        if(!(data && data.ok && data.user && data.user.activated)){
          localStorage.removeItem(LS_ACTIVE);
          localStorage.removeItem(LS_CODE);
          location.replace("activation.html?next=" + encodeURIComponent(nextUrl));
          return false;
        }

        localStorage.setItem(LS_ACTIVE, "1");
        localStorage.setItem(LS_EMAIL, String(data.user.email || "").trim().toLowerCase());
        if(data.user.activatedCode){
          localStorage.setItem(LS_CODE, data.user.activatedCode);
        }

        return true;
      }catch(e){
        location.replace("activation.html?next=" + encodeURIComponent(nextUrl));
        return false;
      }
    }

    function buildNextUrl(path){
      const cleanPath = String(path || "").trim() || "single_game.html";
      const siteAccess = getRememberedNewSiteAccess();

      if(!siteAccess.allowed) return cleanPath;

      try{
        const url = new URL(cleanPath, location.href);
        url.searchParams.set("sg_token", siteAccess.token);
        url.searchParams.set("sg_game", NEW_GAME_ID);
        url.searchParams.set("sg_temp", "1");
        return url.toString();
      }catch(e){
        return cleanPath;
      }
    }

    function safeJSONParse(v){
      try { return JSON.parse(v); }
      catch(e){ return null; }
    }

    function getPlayersFromSession(){
      const v1 = sessionStorage.getItem(KEY_PLAYERS);
      const p1 = safeJSONParse(v1);
      if (Array.isArray(p1) && p1.length) return p1;

      for (const k of ALT_PLAYER_KEYS){
        const v = sessionStorage.getItem(k);
        const p = safeJSONParse(v);
        if (Array.isArray(p) && p.length) return p;
      }
      return [];
    }

    function normalizePlayersToExpectedKeys(){
      const players = getPlayersFromSession()
        .map(x => String(x || "").trim())
        .filter(Boolean);

      if(players.length){
        sessionStorage.setItem(KEY_PLAYERS, JSON.stringify(players));
        sessionStorage.setItem("bara_players", JSON.stringify(players));
        sessionStorage.setItem("bara_players_list", JSON.stringify(players));
        sessionStorage.setItem("baraPlayers", JSON.stringify(players));
      }
      return players;
    }

    function normalizePlayerNameForCompare(name){
      return String(name || "").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function findDuplicatePlayerName(list){
      const seen = new Set();
      for(const name of list){
        const cleanName = String(name || "").trim();
        const key = normalizePlayerNameForCompare(cleanName);
        if(!key) continue;
        if(seen.has(key)) return cleanName;
        seen.add(key);
      }
      return "";
    }

    function setCategoryEverywhere(key, label){
      selectedKey = key;
      selectedLabel = String(label || "");

      sessionStorage.setItem(KEY_CATEGORY, key);
      sessionStorage.setItem("bara_category_id", key);
      sessionStorage.setItem("bara_category_label", selectedLabel);
      sessionStorage.setItem("bara_selectedCategory", key);
      sessionStorage.setItem("bara_category", key);
      sessionStorage.setItem("bara_category_key", key);
      sessionStorage.setItem("bara_step", "category");

      startBtn.disabled = false;
    }

    function loadImageNow(img, src){
      img.onload = () => img.classList.add("loaded");
      img.onerror = () => img.classList.add("loaded");
      img.src = src;
    }

    function buildGrid(){
      grid.innerHTML = "";

      CATEGORIES.forEach((cat) => {
        const size = IMAGE_SIZES[cat.key] || { file: "", w: 170, h: 95 };

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cat";
        btn.setAttribute("data-key", cat.key);
        btn.setAttribute("data-label", cat.label);

        const title = document.createElement("div");
        title.className = "catTitle";
        title.textContent = cat.label;

        const wrap = document.createElement("div");
        wrap.className = "catImageWrap";

        const img = document.createElement("img");
        img.alt = "";
        img.width = size.w;
        img.height = size.h;
        img.decoding = "sync";
        img.loading = "eager";
        img.fetchPriority = "high";
        img.style.width = size.w + "px";
        img.style.height = size.h + "px";

        wrap.appendChild(img);
        btn.appendChild(title);
        btn.appendChild(wrap);

        btn.addEventListener("click", () => {
          document.querySelectorAll(".cat").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          setCategoryEverywhere(cat.key, cat.label);
        });

        grid.appendChild(btn);

        loadImageNow(img, size.file);
      });
    }

    function clearAllGameState(){
      const ssKeys = [];
      for(let i = 0; i < sessionStorage.length; i++){
        const k = sessionStorage.key(i);
        if(k) ssKeys.push(k);
      }

      ssKeys.forEach(k => {
        if(k.startsWith("bara_")) sessionStorage.removeItem(k);
      });

      sessionStorage.removeItem(KEY_PLAYERS);
      sessionStorage.removeItem(KEY_CATEGORY);
      sessionStorage.removeItem("singleState");

      const lsKeys = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(k) lsKeys.push(k);
      }

      lsKeys.forEach(k => {
        if(k.startsWith("bara_")) localStorage.removeItem(k);
      });
    }

    homeBtn.addEventListener("click", () => {
      clearAllGameState();
      window.location.href = "index.html";
    });

    async function initPage(){
      const allowed = await ensureAuthorized();
      if(!allowed) return;

      buildGrid();

      const players = normalizePlayersToExpectedKeys();
      if(players.length < 3){
        alert("الأسماء غير موجودة. ارجع للصفحة السابقة وأدخل الأسماء ثم جرّب مرة ثانية.");
        window.location.href = buildNextUrl("single.html");
        return;
      }

      if(findDuplicatePlayerName(players)){
        alert("لا يمكن تكرار أسماء اللاعبين. اكتب اسم مختلف لكل لاعب.");
        window.location.href = buildNextUrl("single.html");
        return;
      }

      let saved = (sessionStorage.getItem(KEY_CATEGORY) || "").trim();
      if(!saved){
        for (const k of ALT_CAT_KEYS){
          const v = (sessionStorage.getItem(k) || "").trim();
          if(v){
            saved = v;
            break;
          }
        }
      }

      if(saved){
        const btn = Array.from(document.querySelectorAll(".cat"))
          .find(b => b.getAttribute("data-key") === saved);

        if(btn){
          btn.classList.add("active");
          setCategoryEverywhere(saved, btn.getAttribute("data-label") || "");
        }
      }
    }

    startBtn.addEventListener("click", async () => {
      const allowed = await ensureAuthorized();
      if(!allowed) return;

      if(!selectedKey){
        alert("اختر نوع السالفة أولاً.");
        return;
      }

      const players = normalizePlayersToExpectedKeys();
      if(players.length < 3){
        alert("الأسماء غير موجودة. ارجع وأدخل الأسماء.");
        window.location.href = buildNextUrl("single.html");
        return;
      }

      if(findDuplicatePlayerName(players)){
        alert("لا يمكن تكرار أسماء اللاعبين. اكتب اسم مختلف لكل لاعب.");
        window.location.href = buildNextUrl("single.html");
        return;
      }

      sessionStorage.setItem(KEY_CATEGORY, selectedKey);
      sessionStorage.setItem("bara_category_id", selectedKey);
      sessionStorage.setItem("bara_selectedCategory", selectedKey);
      sessionStorage.setItem("bara_category", selectedKey);
      sessionStorage.setItem("bara_category_key", selectedKey);
      sessionStorage.setItem("bara_category_label", selectedLabel);

      window.location.href = buildNextUrl("single_game.html");
    });

    window.addEventListener("load", initPage);
  </script>

</body>
</html>
