<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>لعبة برا السالفة - انتظار (بعد فهمت)</title>

  <style>
    :root{
      --bg:#e9e3d6;
      --green:#3f5b2a;
      --green2:#6e8554;
      --yellow:#f2c300;
      --blue:#bfe3ff;
      --text:#1a1a1a;
      --muted:#9a9a9a;
      --shadow: 0 10px 0 rgba(0,0,0,0.18);
      --shadowSmall: 0 8px 0 rgba(0,0,0,0.18);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    .page{
      min-height: 100vh;
      padding: 14px 12px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .frame{
      width: min(520px, 100%);
      background: var(--bg);
      border: 6px solid var(--green);
      border-radius: 26px;
      padding: 18px 16px 22px;
      position: relative;

      min-height: calc(100vh - 28px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topRow{
      position: relative;
      min-height: 86px;
      margin-bottom: 10px;
      padding-left: 118px;
    }
    .logo{
      position:absolute;
      left: 10px;
      top: 2px;
      width: 98px;
      height: 98px;
      object-fit: contain;
      opacity: 0.98;
      pointer-events:none;
    }
    .h1{
      position:absolute;
      right: 18px;
      top: 22px;
      margin:0;
      text-align:right;
      color: var(--green);
      font-weight: 1000;
      font-size: 34px;
      letter-spacing: .2px;
      line-height: 1.15;
      white-space:nowrap;
    }

    .centerBlock{
      flex: 1;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 14px;
      padding-top: 10px;
    }

    .status{
      width: min(460px, 92%);
      background: var(--green);
      border: 4px solid rgba(0,0,0,0.18);
      border-radius: 18px;
      padding: 14px 14px;
      text-align:center;
      font-weight: 1000;
      font-size: 20px;
      color:#fff;

      min-height: 62px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .statusText{
      display:block;
      width:100%;
      line-height: 1.2;
      white-space:nowrap;
    }

    .namesCard{
      width: min(460px, 92%);
      background: rgba(63,91,42,0.75);
      border-radius: 22px;
      padding: 14px 14px 14px;
    }
    .namesTitle{
      margin: 2px 0 10px;
      text-align:center;
      color:#fff;
      font-size: 30px;
      font-weight: 1000;
    }

    .list{
      background: rgba(0,0,0,0.10);
      border-radius: 18px;
      padding: 12px 10px;
      min-height: 180px;
    }

    .playerItem{
      width: 100%;
      padding: 14px 14px;
      border: 4px solid var(--green2);
      border-radius: 18px;
      background:#fff;
      font-size: 20px;
      font-weight: 900;
      color:#111;
      text-align:center;
      margin-bottom: 12px;
      user-select:none;
    }

    /* ✅ اللي وصل يصير سماوي */
    .playerItem.arrived{
      background: var(--blue);
      border-color: rgba(0,0,0,0.35);
    }

    .emptyHint{
      text-align:center;
      color: rgba(255,255,255,0.85);
      font-weight: 900;
      font-size: 16px;
      padding: 10px 8px 6px;
    }

    .btnRow{
      width: min(460px, 92%);
      display:flex;
      justify-content:center;
      margin-top: 6px;
    }

    .btn{
      width: min(360px, 82%);
      border: 4px solid #000;
      border-radius: 22px;
      padding: 14px 18px;
      font-size: 28px;
      font-weight: 1000;
      box-shadow: var(--shadow);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      text-align:center;
      background: var(--yellow);
      color:#111;
    }
    .btn.buy{
      background: var(--blue);
    }
    .btn:active{ transform: translateY(1px); box-shadow: 0 9px 0 rgba(0,0,0,0.18); }
    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .err{
      width: min(460px, 92%);
      text-align:center;
      color:#b00020;
      font-weight: 900;
      font-size: 16px;
      display:none;
      line-height: 1.4;
      margin: 6px auto 0;
    }

    @media (max-width: 360px){
      .h1{ font-size: 30px; top: 20px; right: 16px; }
      .logo{ width: 90px; height: 90px; }
      .btn{ font-size: 26px; }
      .namesTitle{ font-size: 28px; }
      .status{ font-size: 18px; min-height: 58px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <div class="topRow">
        <img class="logo" src="logo.PNG" alt="logo">
        <div class="h1">لعبة برا السالفة</div>
      </div>

      <div class="centerBlock">
        <div class="status">
          <span id="statusText" class="statusText">بانتظار وصول الجميع…</span>
        </div>

        <div class="namesCard">
          <div class="namesTitle">اللاعبين</div>
          <div class="list" id="list">
            <div class="emptyHint" id="emptyHint">إذا ما ظهرت الأسماء، انتظر ثواني…</div>
            <div id="playersWrap"></div>
          </div>
        </div>

        <div class="btnRow" id="btnRow">
          <button id="nextBtn" class="btn" style="display:none;" disabled>التالي</button>
          <button id="buyBtn" class="btn buy" style="display:none;">لشراء اللعبة اضغط هنا</button>
        </div>

        <div id="err" class="err"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { ensureRoom, listenRoom, roomRef, updateRoomFields } from "./data/firebase.js";
    import {
      updateDoc,
      serverTimestamp,
      increment,
      arrayUnion
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

    const statusText  = document.getElementById("statusText");
    const playersWrap = document.getElementById("playersWrap");
    const emptyHint   = document.getElementById("emptyHint");
    const nextBtn     = document.getElementById("nextBtn");
    const buyBtn      = document.getElementById("buyBtn");
    const errBox      = document.getElementById("err");

    function showErr(msg){
      errBox.textContent = msg;
      errBox.style.display = "block";
    }
    function hideErr(){
      errBox.textContent = "";
      errBox.style.display = "none";
    }
    function cleanName(x){ return String(x || "").trim(); }

    // ✅ اسم اللاعب/المقدم من التخزين (نفس ready.html)
    const POSSIBLE_PLAYER_KEYS = [
      "bara_playerName_multi",
      "bara_playerName_multi_v1",
      "bara_playerName_multi_v2"
    ];
    const POSSIBLE_HOST_KEYS = [
      "bara_hostName_multi_v4",
      "bara_hostName_multi_v3",
      "bara_hostName_multi_v2",
      "bara_hostName_multi_v1"
    ];

    function getMyName(){
      for(const k of POSSIBLE_PLAYER_KEYS){
        const v = cleanName(sessionStorage.getItem(k));
        if(v) return v;
      }
      for(const k of POSSIBLE_HOST_KEYS){
        const v = cleanName(localStorage.getItem(k));
        if(v) return v;
      }
      return "";
    }

    function isHostDevice(myName){
      for(const k of POSSIBLE_HOST_KEYS){
        const v = cleanName(localStorage.getItem(k));
        if(v && myName && v === myName) return true;
      }
      return false;
    }

    function uniqKeepOrder(arr){
      const s = new Set();
      const out = [];
      for(const x of (arr || [])){
        const v = cleanName(x);
        if(!v) continue;
        if(s.has(v)) continue;
        s.add(v);
        out.push(v);
      }
      return out;
    }

    function sortPlayers(list){
      return (list || []).slice().sort((a,b)=>{
        const aa = Number(a?.joinedAt || 0);
        const bb = Number(b?.joinedAt || 0);
        return aa - bb;
      });
    }

    function render(allNames, arrivedSet){
      playersWrap.innerHTML = "";

      const names = uniqKeepOrder(allNames || []);
      if(!names.length){
        emptyHint.style.display = "block";
        return;
      }
      emptyHint.style.display = "none";

      for(const n of names){
        const div = document.createElement("div");
        div.className = "playerItem" + (arrivedSet?.has(n) ? " arrived" : "");
        div.textContent = n;
        playersWrap.appendChild(div);
      }
    }

    buyBtn.addEventListener("click", () => {
      window.open("https://sandooq-m.com", "_blank", "noopener,noreferrer");
    });

    // room from URL
    const params = new URLSearchParams(location.search);
    const roomId = cleanName(params.get("room"));
    const myName = getMyName();
    const iAmHost = isHostDevice(myName);

    // ✅ عرض الزر الصحيح حسب الجهاز
    if(iAmHost){
      nextBtn.style.display = "block";
      buyBtn.style.display = "none";
    }else{
      nextBtn.style.display = "none";
      buyBtn.style.display = "block";
    }

    // ✅ عند دخول الصفحة: نضيف الاسم لقائمة understood (احتياط)
    async function markUnderstoodOnce(){
      if(!roomId || !myName) return;
      try{
        await updateDoc(roomRef(roomId), {
          updatedAt: serverTimestamp(),
          tick: increment(1),
          understoodList: arrayUnion(myName)
        });
      }catch(e){}
    }

    function goNext(){
      window.location.href = "multi_questions.html?room=" + encodeURIComponent(roomId);
    }

    // ✅ (إضافة مطلوبة فقط) دعم صفحات الجولة الجديدة
    function goRoundPage(){
      window.location.href = "multi_round.html?room=" + encodeURIComponent(roomId);
    }

    nextBtn.addEventListener("click", async () => {
      hideErr();
      if(!roomId){
        showErr("الرابط غير صحيح: رمز الغرفة غير موجود.");
        return;
      }
      if(!iAmHost){
        return;
      }

      nextBtn.disabled = true;
      try{
        // ✅ (تعديل مطلوب فقط) نبدأ من شاشة "وقت الأسئلة" أولاً
        await updateRoomFields(roomId, { phase: "questions_intro" });
      }catch(e){
        console.warn(e);
        showErr("صار خطأ في الاتصال. حدّث الصفحة وجرب مرة ثانية.");
        nextBtn.disabled = false;
      }
    });

    (async () => {
      if(!roomId){
        showErr("الرابط غير صحيح: رمز الغرفة غير موجود.");
        statusText.textContent = "خطأ في الرابط";
        return;
      }
      if(!myName){
        showErr("اسمك غير معروف في هذا الجهاز. ارجع للصفحة السابقة وادخل اسمك ثم جرّب.");
      }

      hideErr();

      try{
        await ensureRoom(roomId);
        await markUnderstoodOnce();

        listenRoom(roomId, (data) => {
          if(!data) return;

          const phase = cleanName(data?.phase);

          const players = Array.isArray(data?.players) ? data.players : [];
          const ordered = sortPlayers(players);
          const allNames = ordered.map(p => cleanName(p?.name)).filter(Boolean);

          const understoodList = Array.isArray(data?.understoodList) ? data.understoodList : [];
          const arrivedSet = new Set(uniqKeepOrder(understoodList));

          render(allNames, arrivedSet);

          const total = uniqKeepOrder(allNames).length;
          const arrived = Array.from(arrivedSet).filter(n => uniqKeepOrder(allNames).includes(n)).length;

          if(total >= 3){
            statusText.textContent = `وصل ${arrived} من ${total}`;
          }else{
            statusText.textContent = "بانتظار وصول الجميع…";
          }

          const allArrived = (total >= 3 && arrived >= total);

          if(iAmHost){
            nextBtn.disabled = !allArrived;
          }

          // ✅ (إضافة مطلوبة فقط) توجيه حسب المرحلة
          if(["vote","reveal","guess","results","round_end"].includes(phase)){
            goRoundPage();
            return;
          }
          if(["questions_intro","questions","suspect","end_questions"].includes(phase)){
            goNext();
            return;
          }
        });

      }catch(e){
        console.warn(e);
        showErr("صار خطأ في الاتصال. حدّث الصفحة وجرب مرة ثانية.");
        statusText.textContent = "تعذر الاتصال";
      }
    })();
  </script>
</body>
</html>

<!-- ready_wait.html برا السالفة – إصدار 2 (ربط بسيط مع phases + بداية questions_intro) -->
