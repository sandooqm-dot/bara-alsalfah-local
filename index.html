<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>لعبة برا السالفة</title>

  <script>
    (function () {
      const GAME_KEY = "bara_alsalfah";
      const LS_ACTIVE = `SNDQ_ACTIVE_${GAME_KEY}`;
      const LS_CODE   = `SNDQ_CODE_${GAME_KEY}`;

      function isActivated(){
        return localStorage.getItem(LS_ACTIVE) === "1" && !!localStorage.getItem(LS_CODE);
      }

      if (isActivated()) {
        location.replace("single.html");
      } else {
        location.replace("activation.html?next=" + encodeURIComponent("single.html"));
      }
    })();
  </script>

  <style>
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:#e9e1cf;
    }
  </style>
</head>
<body></body>
</html>
